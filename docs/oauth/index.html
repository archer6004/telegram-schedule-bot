<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google 인증 완료</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f4ff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 32px 24px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      text-align: center;
    }
    .icon { font-size: 48px; margin-bottom: 12px; }
    h1 { font-size: 22px; color: #1a1a2e; margin-bottom: 8px; }
    .sub { color: #666; font-size: 14px; margin-bottom: 24px; }

    #error-section { display: none; }
    #error-section h1 { color: #c0392b; }

    .step {
      background: #f8f9ff;
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 12px;
      text-align: left;
      font-size: 14px;
      color: #444;
    }
    .step strong { color: #3b5bdb; }

    .code-box {
      background: #1a1a2e;
      color: #a8ff78;
      border-radius: 10px;
      padding: 16px;
      font-family: monospace;
      font-size: 13px;
      word-break: break-all;
      margin: 20px 0;
      text-align: left;
      line-height: 1.6;
      user-select: all;
    }

    .copy-btn {
      background: #3b5bdb;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px 28px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }
    .copy-btn:active { background: #2f4ac4; }
    .copied { background: #2ecc71 !important; }

    .hint {
      margin-top: 16px;
      font-size: 13px;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="card" id="success-section">
    <div class="icon">✅</div>
    <h1>Google 인증 완료!</h1>
    <p class="sub">아래 코드를 복사해서 텔레그램에 붙여넣으세요.</p>

    <div class="step"><strong>① 아래 [코드 복사] 버튼</strong>을 탭하세요.</div>
    <div class="step"><strong>② 텔레그램 봇 채팅</strong>으로 이동하세요.</div>
    <div class="step"><strong>③ 복사한 코드를 붙여넣기</strong>하고 전송하세요.</div>

    <div class="code-box" id="code-display">불러오는 중...</div>
    <button class="copy-btn" id="copy-btn" onclick="copyCode()">📋 코드 복사</button>
    <p class="hint">코드는 한 번만 사용 가능합니다. 빠르게 붙여넣어 주세요.</p>
  </div>

  <div class="card" id="error-section">
    <div class="icon">❌</div>
    <h1>인증 실패</h1>
    <p class="sub" id="error-msg">알 수 없는 오류가 발생했습니다.</p>
    <p class="hint">텔레그램에서 /connect 를 다시 시도해 주세요.</p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");
    const error = params.get("error");

    if (error) {
      document.getElementById("success-section").style.display = "none";
      document.getElementById("error-section").style.display = "block";
      document.getElementById("error-msg").textContent =
        error === "access_denied" ? "인증을 취소했습니다." : `오류: ${error}`;
    } else if (code) {
      document.getElementById("code-display").textContent = code;
    } else {
      document.getElementById("success-section").style.display = "none";
      document.getElementById("error-section").style.display = "block";
      document.getElementById("error-msg").textContent = "코드를 찾을 수 없습니다. /connect 를 다시 시도해 주세요.";
    }

    function copyCode() {
      const code = document.getElementById("code-display").textContent;
      navigator.clipboard.writeText(code).then(() => {
        const btn = document.getElementById("copy-btn");
        btn.textContent = "✅ 복사됨!";
        btn.classList.add("copied");
        setTimeout(() => {
          btn.textContent = "📋 코드 복사";
          btn.classList.remove("copied");
        }, 2000);
      }).catch(() => {
        // fallback: select text
        const el = document.getElementById("code-display");
        const range = document.createRange();
        range.selectNode(el);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
        document.execCommand("copy");
        alert("복사되었습니다!");
      });
    }
  </script>
</body>
</html>
