<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google 인증 완료</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f4ff;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 20px;
    }
    .card {
      background: #fff; border-radius: 16px; padding: 32px 24px;
      max-width: 480px; width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10); text-align: center;
    }
    .icon { font-size: 56px; margin-bottom: 12px; }
    h1 { font-size: 22px; color: #1a1a2e; margin-bottom: 8px; }
    .sub { color: #666; font-size: 15px; margin-bottom: 28px; }
    #error-section { display: none; }
    #error-section h1 { color: #c0392b; }

    .btn {
      display: block; width: 100%; border: none; border-radius: 12px;
      padding: 16px; font-size: 17px; font-weight: 700;
      cursor: pointer; transition: all 0.2s; margin-bottom: 12px;
      text-decoration: none; text-align: center;
    }
    .btn-tg  { background: #229ED9; color: #fff; }
    .btn-tg:active  { background: #1a8abf; }
    .btn-copy { background: #f0f4ff; color: #3b5bdb; border: 2px solid #3b5bdb; }
    .btn-copy:active { background: #dde5ff; }
    .btn-done { background: #2ecc71 !important; color: #fff; }

    .hint { margin-top: 12px; font-size: 12px; color: #aaa; }
  </style>
</head>
<body>
  <div class="card" id="success-section">
    <div class="icon">✅</div>
    <h1>Google 인증 완료!</h1>
    <p class="sub">아래 버튼을 탭해서 텔레그램에 코드를 전달하세요.</p>

    <a id="tg-btn" class="btn btn-tg" href="#">
      📨 텔레그램으로 코드 전송
    </a>
    <button class="btn btn-copy" id="copy-btn" onclick="copyCode()">
      📋 코드만 복사
    </button>
    <p class="hint">버튼 탭 → 텔레그램 열림 → 자동으로 코드 전송됩니다.</p>
  </div>

  <div class="card" id="error-section">
    <div class="icon">❌</div>
    <h1>인증 실패</h1>
    <p class="sub" id="error-msg">알 수 없는 오류가 발생했습니다.</p>
    <p class="hint">텔레그램에서 /connect 를 다시 시도해 주세요.</p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code  = params.get("code");
    const error = params.get("error");
    const BOT   = "assist_uu_bot";

    if (error) {
      document.getElementById("success-section").style.display = "none";
      document.getElementById("error-section").style.display   = "block";
      document.getElementById("error-msg").textContent =
        error === "access_denied" ? "인증을 취소했습니다." : `오류: ${error}`;
    } else if (code) {
      // Build Telegram deep link — opens bot and pre-fills the code as a message
      const tgUrl = `tg://resolve?domain=${BOT}&start=oauth_placeholder`;
      // We'll send via share URL which works on mobile
      const shareText = encodeURIComponent(code);
      const tgBtn = document.getElementById("tg-btn");
      // Use Telegram's t.me link which opens the app and can pass text
      tgBtn.href = `https://t.me/${BOT}?start=OAUTHCODE`;
      tgBtn.onclick = function(e) {
        e.preventDefault();
        // Copy code to clipboard first, then open Telegram
        navigator.clipboard.writeText(code).then(() => {
          window.location.href = `https://t.me/${BOT}`;
        }).catch(() => {
          // fallback: select
          const ta = document.createElement("textarea");
          ta.value = code; document.body.appendChild(ta);
          ta.select(); document.execCommand("copy");
          document.body.removeChild(ta);
          window.location.href = `https://t.me/${BOT}`;
        });
      };
    } else {
      document.getElementById("success-section").style.display = "none";
      document.getElementById("error-section").style.display   = "block";
      document.getElementById("error-msg").textContent = "코드를 찾을 수 없습니다. /connect 를 다시 시도해 주세요.";
    }

    function copyCode() {
      navigator.clipboard.writeText(code).then(() => {
        const btn = document.getElementById("copy-btn");
        btn.textContent = "✅ 복사됨!";
        btn.classList.add("btn-done");
        setTimeout(() => {
          btn.textContent = "📋 코드만 복사";
          btn.classList.remove("btn-done");
        }, 2000);
      }).catch(() => {
        const ta = document.createElement("textarea");
        ta.value = code; document.body.appendChild(ta);
        ta.select(); document.execCommand("copy");
        document.body.removeChild(ta);
        alert("복사되었습니다! 텔레그램에 붙여넣기 하세요.");
      });
    }
  </script>
</body>
</html>
